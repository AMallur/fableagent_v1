name: Test Optum Sandbox

on:
  workflow_dispatch:

jobs:
  test-optum:
    runs-on: ubuntu-latest
    environment: testenv

    defaults:
      run:
        working-directory: engine

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test Optum authentication
        env:
          OPTUM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          OPTUM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          OPTUM_API_BASE_URL: https://sandbox-apigw.optum.com/rcm/prior-authorization/v1
          OPTUM_ENDPOINT_PATH: /healthcheck
        run: node scripts/optum_sandbox_explore.ts
